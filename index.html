<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fusion Fest Community</title>
    <style>
        :root {
            --blue: #007bff;
            --orange: #fd7e14;
            --green: #28a745;
            --dark: #0f172a;
        }

        * { box-sizing: border-box; }
        body { 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            background-color: #050505; 
            color: white; 
            overflow-x: hidden;
        }

        /* --- GLOW EFFECTS (Added by Gemini) --- */
        .glow-logo {
            box-shadow: 0 0 20px var(--orange);
        }
        
        .member-card {
            background: #111 !important;
            border: 1px solid #333 !important;
            transition: 0.4s !important;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .member-card:hover {
            border-color: var(--orange) !important;
            box-shadow: 0 0 20px rgba(253, 126, 20, 0.4) !important;
            transform: translateY(-5px);
        }

        .member-photo {
            box-shadow: 0 0 15px var(--orange);
            transition: 0.4s;
        }
        
        .member-card:hover .member-photo {
            box-shadow: 0 0 25px var(--orange);
        }
        /* -------------------------------------- */

        /* Nav Style */
        nav {
            background: rgba(0, 0, 0, 0.9);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #333;
        }

        .nav-brand { font-weight: bold; color: var(--orange); font-size: 1.3rem; }
        .menu-icon { font-size: 30px; cursor: pointer; }

        .nav-links {
            display: none;
            position: absolute;
            top: 65px;
            right: 0;
            background: #111;
            width: 100%;
            flex-direction: column;
            text-align: center;
            border-bottom: 2px solid var(--orange);
        }

        .nav-links a {
            color: white;
            padding: 20px;
            text-decoration: none;
            font-weight: bold;
            border-bottom: 1px solid #222;
        }

        .nav-links.active { display: flex; }

        /* Animation Keyframes */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .page-section {
            display: none;
            padding: 50px 20px;
            min-height: 90vh;
        }

        .active-section {
            display: block;
            animation: fadeInUp 0.8s ease-out;
        }

        /* Dashboard/Home */
        header { text-align: center; margin-bottom: 30px; }
        header img { 
            width: 160px; 
            border-radius: 50%; 
            border: 4px solid var(--orange);
            margin-bottom: 20px;
        }

        .container { max-width: 900px; margin: auto; }
        .card {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-top: 5px solid var(--blue);
            text-align: center;
        }

        /* Panel Members Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .member-card {
            background: #222;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #333;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: var(--blue);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            margin-top: 20px;
            font-weight: bold;
        }

        footer { text-align: center; padding: 40px; font-size: 0.9rem; color: #777; }
    </style>
</head>
<body>

<nav>
    <div class="nav-brand">FUSION FEST</div>
    <div class="menu-icon" onclick="toggleMenu()">☰</div>
    <div class="nav-links" id="navLinks">
        <a onclick="show('home')">Dashboard</a>
        <a onclick="show('panel')">Panel Members</a>
        <a onclick="show('prizes')">Prize Section</a>
        <a onclick="show('exam')">Exam Details</a>
    </div>
</nav>

<div id="home" class="page-section active-section">
    <div class="container">
        <header>
            <img src="fusion.jpg"
